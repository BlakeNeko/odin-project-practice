<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Small Library</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <aside>
        <h1>Small Library</h1>
        <form action="#">
          <label for="input-title">书名</label>
          <input type="text" id="input-title" placeholder="书名" />
          <label for="input-author">作者</label>
          <input type="text" id="input-author" placeholder="作者" />
          <label for="input-read">是否已读</label>
          <input type="checkbox" id="input-read" placeholder="是否已读" />
        </form>
        <button id="add-book">添加书籍</button>
      </aside>
      <main></main>
    </div>
  </body>
  <script type="module" src="./script.js"></script>
</html>
