<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Rock Paper Scissors</h1>
      <p>Choose rock, paper, or scissors</p>
      <div class="choices">
        <button class="rock">✊</button>
        <button class="paper">✋</button>
        <button class="scissors">✌</button>
      </div>
      <div class="scores">
        <span class="human">Human: 0</span>
        <span class="computer">Computer: 0</span>
      </div>
      <div class="message">
        <p class="each-round"></p>
        <p class="final-message"></p>
      </div>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
